short_bio: >-
  <p>
    I am a MEXT Scholar and final-year master’s student at The University of Osaka, where I am currently conducting research in 3D computer vision, generative AI, and geometric deep learning.
    I work in the <a href="https://www.lab.ime.cmc.osaka-u.ac.jp/?lang=en" target="_blank"><strong>Integrated Media Environment Lab (Uranishi Laboratory)</strong></a> under the guidance of
    <a href="https://sites.google.com/view/n-chiba-/top-en" target="_blank"><strong>Assoc. Prof. Naoya Chiba</strong></a>
    and
    <a href="https://sites.google.com/view/tomohiromashitaphd/home" target="_blank"><strong>Prof. Tomohiro Mashita</strong></a>.
  </p>
  <p>
    My research interests include 3D data understanding, point cloud processing, 3D scene understanding, shape representation learning, and mesh generation.
    I am interested in developing learning-based methods for understanding and generating structured 3D content, with applications in computer vision, robotics, and intelligent visual systems.
  </p>

